<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XORCISM — Nouveau mot de passe</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar"><span class="logo">&#9670; XORCISM</span><span class="spacer"></span><span class="title" data-i18n="title.reset">Nouveau mot de passe</span></div>
<div style="display:flex;justify-content:center;align-items:flex-start;padding-top:8vh">
  <div class="card" style="width:380px;max-width:94vw">
    <div class="card-header"><span class="card-title" data-i18n="reset.cardTitle">Choisir un nouveau mot de passe</span></div>
    <form id="f">
      <label data-i18n="login.newPw">Nouveau mot de passe</label>
      <input id="password" type="password" required autofocus autocomplete="new-password" style="width:100%;background:#0f1117;border:1px solid #2d3250;border-radius:6px;padding:9px 11px;color:#e2e8f0;font-size:14px">
      <p style="font-size:11px;color:#64748b;margin:6px 0" data-i18n="reset.pwPolicyShort">Min. 12 caractères, mêlant au moins 3 types.</p>
      <div id="err" style="color:#f87171;font-size:13px;min-height:18px;margin:8px 0"></div>
      <button class="btn btn-primary" type="submit" data-i18n="reset.submit" style="width:100%;justify-content:center;padding:10px">Réinitialiser</button>
    </form>
    <div style="margin-top:12px;font-size:12px"><a href="/login" data-i18n="common.backLogin" style="color:#7c83fd;text-decoration:none">← Connexion</a></div>
  </div>
</div>
<script src="/js/reset.js"></script>
</body>
</html>
