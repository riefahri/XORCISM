<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XORCISM — EBIOS RM</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .eb-wrap{max-width:1280px;margin:0 auto;padding:16px}
  .eb-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:12px 0}
  .eb-head h2{margin:0;font-size:18px;color:#e2e8f0}
  .eb-stats{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
  .eb-stat{background:#13162a;border:1px solid #2d3250;border-radius:8px;padding:10px 14px;min-width:120px}
  .eb-stat .n{font-size:22px;font-weight:700;color:#e2e8f0}
  .eb-stat .l{font-size:11px;color:#94a3b8;margin-top:2px}
  table.eb{width:100%;border-collapse:collapse;font-size:13px}
  table.eb th{text-align:left;padding:7px 10px;color:#94a3b8;border-bottom:1px solid #2d3250;position:sticky;top:0;background:#0f1117;font-weight:600}
  table.eb td{padding:6px 10px;border-bottom:1px solid #1e2133;color:#cbd5e1;vertical-align:top}
  table.eb tr:hover td{background:#13162a}
  table.eb td.num{text-align:center;font-variant-numeric:tabular-nums}
  table.eb a{color:#7c83fd;text-decoration:none}
  table.eb a:hover{text-decoration:underline}
  .pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;border:1px solid currentColor}
  .eb-filter{background:#0f1117;border:1px solid #2d3250;border-radius:6px;color:#e2e8f0;font-size:13px;padding:6px 9px;min-width:240px}
  .ws{display:inline-block;font-size:10px;color:#64748b;border:1px solid #2d3250;border-radius:6px;padding:0 5px;margin-right:2px}
  /* New-risk-assessment modal */
  .eb-modal-bg{position:fixed;inset:0;background:rgba(4,6,15,.66);display:none;align-items:flex-start;justify-content:center;z-index:1000;overflow:auto;padding:40px 16px}
  .eb-modal-bg.open{display:flex}
  .eb-modal{background:#13162a;border:1px solid #2d3250;border-radius:14px;width:560px;max-width:100%;padding:22px 24px}
  .eb-modal h3{margin:0 0 4px;font-size:17px;color:#e2e8f0}
  .eb-modal .lead{font-size:12.5px;color:#94a3b8;margin:0 0 16px}
  .eb-modal .fld{margin-bottom:13px}
  .eb-modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .eb-modal label{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  .eb-modal label .req{color:#f87171}
  .eb-modal input,.eb-modal select,.eb-modal textarea{width:100%;box-sizing:border-box;background:#0f1117;border:1px solid #2d3250;border-radius:8px;padding:9px 11px;color:#e2e8f0;font-size:13px;font-family:inherit}
  .eb-modal input:focus,.eb-modal select:focus,.eb-modal textarea:focus{outline:none;border-color:#7c83fd}
  .eb-modal textarea{resize:vertical;min-height:64px}
  .eb-modal .hint{font-size:11px;color:#64748b;margin-top:4px}
  .eb-chk{display:flex;align-items:center;gap:8px;font-size:13px;color:#cbd5e1;cursor:pointer}
  .eb-chk input{width:auto}
  .eb-modal-foot{display:flex;align-items:center;gap:10px;margin-top:18px}
  .eb-modal-foot .spacer{flex:1}
  .eb-err{color:#f87171;font-size:12px;min-height:16px}
  .eb-method-note{font-size:11px;border-radius:6px;padding:6px 9px;margin-top:6px;display:none}
  .eb-method-note.show{display:block}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo" style="text-decoration:none;color:inherit">&#9670; XORCISM</a>
  <span class="spacer"></span>
  <a href="/?db=XORCISM&amp;table=ASSET">&#128450;&#65039; Assets</a>
  <a href="/dashboard">&#128202; Dashboard</a>
  <a href="/ebios" style="color:#7c83fd">&#127919; EBIOS RM</a>
  <a href="/?db=XCOMPLIANCE&amp;table=RISKASSESSMENT">&#9881;&#65039; Risk assessments</a>
</div>

<div class="eb-wrap">
  <div class="eb-head">
    <h2>&#127919; <span data-i18n="ebios.title">EBIOS Risk Manager</span></h2>
    <input id="eb-search" class="eb-filter" type="search" data-i18n-placeholder="ebios.search" placeholder="Filtrer (étude, statut…)">
    <span style="flex:1"></span>
    <button id="eb-new" class="btn btn-primary btn-sm" data-i18n="ebios.new">+ Nouvelle étude</button>
  </div>
  <div class="eb-stats" id="eb-stats"></div>
  <div id="eb-table"></div>
  <div class="eb-hint" id="eb-hint" style="font-size:12px;color:#64748b;margin-top:12px"></div>
</div>

<!-- Guided "new risk assessment" modal -->
<div class="eb-modal-bg" id="eb-modal">
  <div class="eb-modal">
    <h3 data-i18n="ebios.modal.title">New risk assessment</h3>
    <p class="lead" data-i18n="ebios.modal.lead">Start a guided risk-assessment study. Pick a methodology — EBIOS RM studies appear on this dashboard with their workshops.</p>
    <div class="fld">
      <label data-i18n="ebios.modal.name">Name <span class="req">*</span></label>
      <input id="eb-f-name" type="text" data-i18n-placeholder="ebios.modal.name.ph" placeholder="e.g. 2026 crown-jewels risk study" maxlength="300" autocomplete="off">
    </div>
    <div class="row2">
      <div class="fld">
        <label data-i18n="ebios.modal.method">Methodology</label>
        <select id="eb-f-method">
          <option value="EBIOS RM">EBIOS Risk Manager (ANSSI)</option>
          <option value="ISO/IEC 27005">ISO/IEC 27005</option>
          <option value="NIST SP 800-30">NIST SP 800-30</option>
          <option value="FAIR">FAIR (quantitative)</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
      <div class="fld">
        <label data-i18n="ebios.modal.status">Status</label>
        <select id="eb-f-status">
          <option value="Draft">Draft</option>
          <option value="In progress">In progress</option>
          <option value="In review">In review</option>
          <option value="Approved">Approved</option>
          <option value="Deprecated">Deprecated</option>
        </select>
      </div>
    </div>
    <div class="eb-method-note" id="eb-method-note"></div>
    <div class="row2">
      <div class="fld">
        <label data-i18n="ebios.modal.owner">Owner (optional)</label>
        <select id="eb-f-owner"><option value="" data-i18n="ebios.modal.owner.none">— none —</option></select>
      </div>
      <div class="fld">
        <label data-i18n="ebios.modal.date">Date</label>
        <input id="eb-f-date" type="date">
      </div>
    </div>
    <div class="fld" id="eb-express-wrap">
      <label class="eb-chk"><input type="checkbox" id="eb-f-express"> <span data-i18n="ebios.modal.express">Express mode (single fast-track workshop)</span></label>
    </div>
    <div class="fld">
      <label data-i18n="ebios.modal.desc">Description (optional)</label>
      <textarea id="eb-f-desc" data-i18n-placeholder="ebios.modal.desc.ph" placeholder="Scope, business context, objectives…" maxlength="4000"></textarea>
    </div>
    <div class="eb-err" id="eb-f-err"></div>
    <div class="eb-modal-foot">
      <span class="eb-err" id="eb-f-err2" style="flex:1"></span>
      <button class="btn btn-ghost btn-sm" id="eb-cancel" data-i18n="ebios.modal.cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="eb-create" data-i18n="ebios.modal.create">Create study</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/js/session-ui.js"></script>
<script src="/js/ebios.js"></script>
</body>
</html>
