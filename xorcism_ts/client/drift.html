<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XORCISM — Surface drift</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .df-wrap{max-width:980px;margin:0 auto;padding:18px}
  .df-head{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:6px}
  .df-head h1{font-size:20px;margin:0}
  .df-sub{color:#94a3b8;font-size:13px;margin-bottom:16px;max-width:780px}
  .snap{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .scard{background:#13162a;border:1px solid #2d3250;border-radius:10px;padding:12px 16px;min-width:150px}
  .scard .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8}
  .scard .big{font-size:24px;font-weight:700;color:#e2e8f0}
  .scard .delta{font-size:12px;margin-left:6px}.up{color:#fca5a5}.down{color:#6ee7b7}
  h3{font-size:13px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin:16px 0 6px}
  .grp{border:1px solid #2d3250;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#13162a}
  .grp .t{font-size:13px;font-weight:600;margin-bottom:4px}
  .t-add{color:#6ee7b7}.t-rem{color:#94a3b8}.t-exp{color:#fca5a5}.t-une{color:#7dd3fc}
  .chip{display:inline-block;background:#0f1117;border:1px solid #2d3250;border-radius:5px;padding:2px 7px;font-size:11px;margin:2px 3px 0 0;color:#cbd5e1}
  .muted{color:#64748b}.df-empty{color:#64748b;padding:24px;text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">&#9670; XORCISM</span>

  <span class="spacer"></span>
  <span class="title">&#128200; Surface drift</span>
</div>

<div class="df-wrap">
  <div class="df-head">
    <h1>Attack-surface drift</h1>
    <button class="btn btn-primary btn-sm" id="df-snap">📸 Take snapshot</button>
  </div>
  <div class="df-sub">Snapshots your external surface and diffs consecutive captures — what <b>appeared</b>, <b>vanished</b>, or newly became <b>internet-exposed</b>. Pair with the OSINT discovery chain to turn discovery into continuous monitoring.</div>
  <div id="df-body"><div class="df-empty">Loading…</div></div>
</div>
