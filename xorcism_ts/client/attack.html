<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XORCISM — MITRE ATT&amp;CK</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .att-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:14px 16px}
  .att-toolbar h2{margin:0;font-size:18px;color:#e2e8f0}
  .att-toolbar select,.att-toolbar input{background:#0f1117;border:1px solid #2d3250;border-radius:6px;color:#e2e8f0;font-size:13px;padding:6px 9px}
  .att-toolbar input{min-width:220px}
  .att-stats{font-size:12px;color:#94a3b8}
  .matrix{display:flex;gap:8px;overflow-x:auto;padding:0 16px 24px;align-items:flex-start}
  .att-col{flex:0 0 196px;width:196px;background:#13162a;border:1px solid #2d3250;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;max-height:78vh}
  .att-col-head{padding:8px 10px;border-bottom:1px solid #2d3250;background:#171b30;position:sticky;top:0}
  .att-tac-name{font-size:12.5px;font-weight:600;color:#e2e8f0;line-height:1.2}
  .att-tac-meta{font-size:10px;color:#64748b;margin-top:2px}
  .att-col-body{overflow-y:auto;padding:4px}
  .att-cell{border:1px solid #232843;border-radius:5px;margin:3px 0;background:#0f1117}
  .att-cell-main{display:flex;align-items:center;gap:6px;padding:5px 7px}
  .att-cell a{color:#cbd5e1;text-decoration:none;font-size:11.5px;line-height:1.25;flex:1;word-break:break-word}
  .att-cell a:hover{color:#7c83fd}
  .att-id{color:#64748b;font-size:10px;font-family:ui-monospace,Consolas,monospace}
  .att-sub-toggle{flex:0 0 auto;cursor:pointer;font-size:10px;color:#7c83fd;background:#1a1d2e;border:1px solid #2d3250;border-radius:9px;padding:0 6px;line-height:16px}
  .att-subs{display:none;border-top:1px dashed #232843;padding:2px 0 2px 10px}
  .att-subs.open{display:block}
  .att-sub{padding:2px 7px;font-size:11px}
  .att-sub a{color:#94a3b8;text-decoration:none}
  .att-sub a:hover{color:#7c83fd}
  .att-cell.dep{opacity:.5}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo" style="text-decoration:none;color:inherit">&#9670; XORCISM</a>
  <span class="spacer"></span>
  <a href="/?db=XORCISM&amp;table=ASSET">&#128450;&#65039; Assets</a>
  <a href="/dashboard">&#128202; Dashboard</a>
  <a href="/threat-feeds">&#128225; Threat Feeds</a>
  <a href="/attack" style="color:#7c83fd">&#127919; ATT&amp;CK</a>
  <a href="/d3fend">&#128737;&#65039; D3FEND</a>
  <a href="/a3m">&#129302; A3M</a>
  <a href="/kill-chain">&#9876;&#65039; Kill Chain</a>
  <a href="/ask">&#129302; Ask AI</a>
</div>

<div class="att-toolbar">
  <h2>&#127919; MITRE ATT&amp;CK</h2>
  <label style="font-size:12px;color:#94a3b8">Domaine
    <select id="att-domain">
      <option value="enterprise">Enterprise</option>
      <option value="mobile">Mobile</option>
      <option value="ics">ICS</option>
      <option value="atlas">ATLAS (IA)</option>
    </select>
  </label>
  <label style="font-size:12px;color:#94a3b8">Layer
    <select id="att-layer">
      <option value="bas">🛡 BAS validation coverage</option>
      <option value="llm">🤖 LLM-enabled (Anthropic)</option>
    </select>
  </label>
  <input id="att-search" type="search" placeholder="Filtrer (ID ou nom de technique)…">
  <span class="att-stats" id="att-stats"></span>
</div>
<div id="att-llm-credit" style="display:none;margin:0 16px 10px;font-size:12px;color:#94a3b8"></div>
<div class="matrix" id="att-matrix"></div>

<div id="toast"></div>
<script src="/js/session-ui.js"></script>
<script src="/js/attack.js"></script>
</body>
</html>
