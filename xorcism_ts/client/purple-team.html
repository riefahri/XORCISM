<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-i18n="pt.pageTitle">XORCISM — Detection coverage</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .pt-wrap{max-width:1100px;margin:0 auto;padding:18px}
  .pt-head h1{font-size:20px;margin:0 0 2px}
  .pt-head .sub{color:#94a3b8;font-size:13px;margin-bottom:12px;max-width:820px}
  .gauge{display:flex;align-items:center;gap:14px;margin:10px 0 16px}
  .gring{font-size:30px;font-weight:700}
  .gbar{flex:1;max-width:380px;height:12px;border-radius:6px;background:#1e2133;overflow:hidden}
  .gbar>i{display:block;height:100%}
  .gmeta{font-size:12px;color:#94a3b8}
  table.pt{width:100%;border-collapse:collapse;font-size:13px}
  table.pt th{text-align:left;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #2d3250;padding:8px}
  table.pt td{border-bottom:1px solid #1e2133;padding:8px;vertical-align:top}
  table.pt tr:hover td{background:#13162a}
  .tid a{color:#7c83fd;font-family:ui-monospace,monospace}
  .tool{display:inline-block;background:#0f1117;border:1px solid #2d3250;border-radius:5px;padding:1px 6px;font-size:11px;margin:1px 2px 0 0;color:#cbd5e1}
  .ok{color:#6ee7b7}.gap{color:#fca5a5;font-weight:600}
  .rules{font-size:11px;color:#64748b;margin-top:2px}
  .genbtn{font-size:11px}
  pre.sigma{white-space:pre-wrap;background:#0b0d18;border:1px solid #2d3250;border-radius:6px;padding:10px;font-size:11px;color:#cbd5e1;margin-top:6px;max-height:340px;overflow:auto}
  .muted{color:#64748b}.pt-empty{color:#64748b;padding:24px;text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">&#9670; XORCISM</span>
  <a href="/" data-i18n="nav.explorer">&#8592; Explorer</a>
  <a href="/pentest" id="pt-back" data-i18n="pt.nav.pentest">&#129529; Pentesting</a>
  <span class="spacer"></span>
  <span class="title" data-i18n="pt.nav.title">&#128272;&#65039; Detection coverage</span>
</div>

<div class="pt-wrap">
  <div class="pt-head">
    <h1 data-i18n="pt.h1">Purple-team detection coverage</h1>
    <div class="sub" id="pt-run" data-i18n="pt.sub">Maps each tool in an attack chain to its MITRE ATT&amp;CK technique, then checks your Sigma rule library for a detection. Gaps come first — generate the missing rule with one click.</div>
  </div>
  <div class="gauge" id="pt-gauge" style="display:none">
    <span class="gring" id="pt-pct">—</span>
    <div class="gbar"><i id="pt-bar"></i></div>
    <span class="gmeta" id="pt-gmeta"></span>
  </div>
  <div id="pt-results"><div class="pt-empty" data-i18n="pt.loading">Loading coverage…</div></div>
</div>

<script src="/js/session-ui.js"></script>
<script src="/js/purple-team.js"></script>
</body>
</html>
