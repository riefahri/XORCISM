<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XORCISM — Mot de passe oublié</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar"><span class="logo">&#9670; XORCISM</span><span class="spacer"></span><span class="title" data-i18n="title.forgot">Mot de passe oublié</span></div>
<div style="display:flex;justify-content:center;align-items:flex-start;padding-top:8vh">
  <div class="card" style="width:380px;max-width:94vw">
    <div class="card-header"><span class="card-title" data-i18n="forgot.cardTitle">Réinitialiser le mot de passe</span></div>
    <div id="form-wrap">
      <p style="font-size:12px;color:#94a3b8;margin-bottom:12px" data-i18n="forgot.intro">Saisissez votre e-mail ; si un compte existe, un lien de réinitialisation (valable 1 h) vous sera envoyé.</p>
      <form id="f">
        <label data-i18n="login.email">Email</label>
        <input id="email" type="email" required autofocus style="width:100%;background:#0f1117;border:1px solid #2d3250;border-radius:6px;padding:9px 11px;color:#e2e8f0;font-size:14px">
        <div id="err" style="color:#f87171;font-size:13px;min-height:18px;margin:8px 0"></div>
        <button class="btn btn-primary" type="submit" data-i18n="forgot.submit" style="width:100%;justify-content:center;padding:10px">Envoyer le lien</button>
      </form>
    </div>
    <div id="sent" style="display:none">
      <p style="font-size:13px;color:#86efac" data-i18n="forgot.sent">Si cet e-mail correspond à un compte, un lien de réinitialisation a été envoyé.</p>
    </div>
    <div style="margin-top:12px;font-size:12px"><a href="/login" data-i18n="common.backLogin" style="color:#7c83fd;text-decoration:none">← Connexion</a></div>
  </div>
</div>
<script src="/js/forgot.js"></script>
</body>
</html>
